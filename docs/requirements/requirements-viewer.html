<style>
:root{
  --paper:#faf8f4; --ink:#1f1b16; --ink-soft:#5c554b; --line:#e6e0d6;
  --accent:#b4541e; --accent-soft:#f6e8dd;
  --must:#b4541e; --should:#1d6a96; --could:#5a7d32; --wont:#8a8378;
  --p1:#7a3aa0; --p2:#1d6a96; --p3:#8a8378;
  --card:#ffffff; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;font-size:14px;line-height:1.65}
.wrap{max-width:1100px;margin:0 auto;padding:36px 24px 80px}
header{border-bottom:3px solid var(--ink);padding-bottom:20px;margin-bottom:8px}
header .kicker{font-size:12px;letter-spacing:.18em;color:var(--accent);font-weight:700;margin-bottom:6px}
header h1{font-size:clamp(22px,3.5vw,32px);font-weight:800;letter-spacing:.01em}
header .date{color:var(--ink-soft);font-size:12px;margin-top:6px}
.position{background:var(--accent-soft);border-left:4px solid var(--accent);padding:12px 16px;margin:18px 0;font-size:13px;color:#6b3a17;border-radius:0 8px 8px 0}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:22px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:0 1px 2px rgba(31,27,22,.04)}
.card .num{font-size:28px;font-weight:800;line-height:1.1}
.card .lbl{font-size:11px;color:var(--ink-soft);margin-top:2px;letter-spacing:.05em}
.card.acc .num{color:var(--accent)}
.tabs{display:flex;gap:0;margin:26px 0 0;border-bottom:2px solid var(--ink)}
.tab{appearance:none;border:none;background:none;font:inherit;font-weight:700;font-size:15px;padding:10px 22px;cursor:pointer;color:var(--ink-soft);border-radius:8px 8px 0 0;position:relative}
.tab:hover{background:#f1ece3;color:var(--ink)}
.tab.active{background:var(--ink);color:var(--paper)}
.tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:18px 0 6px}
.search{flex:1 1 240px;min-width:200px}
.search input{width:100%;padding:9px 14px;border:1.5px solid var(--line);border-radius:999px;font:inherit;background:var(--card);transition:border-color .15s}
.search input:focus{outline:none;border-color:var(--accent)}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.chiprow .rowlbl{font-size:11px;font-weight:700;color:var(--ink-soft);letter-spacing:.08em;align-self:center;margin-right:4px;min-width:58px}
.chip{appearance:none;border:1.5px solid var(--line);background:var(--card);font:inherit;font-size:12px;padding:4px 12px;border-radius:999px;cursor:pointer;color:var(--ink-soft);transition:all .12s}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{background:var(--ink);border-color:var(--ink);color:var(--paper);font-weight:700}
.chip:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.count{font-size:12px;color:var(--ink-soft);margin:10px 2px}
.catblock{margin:22px 0 6px}
.catblock h2{font-size:16px;font-weight:800;display:flex;align-items:baseline;gap:8px;border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:10px}
.catblock h2 .n{font-size:12px;color:var(--ink-soft);font-weight:600}
.req{display:grid;grid-template-columns:74px 1fr auto;gap:4px 14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px;transition:box-shadow .15s,border-color .15s}
.req:hover{border-color:#c9bfae;box-shadow:0 3px 10px rgba(31,27,22,.07)}
.req .id{font-family:ui-monospace,Menlo,monospace;font-size:12px;font-weight:700;color:var(--ink-soft);padding-top:2px}
.req .body .nm{font-weight:700;font-size:14px}
.req .body .ds{color:var(--ink-soft);font-size:12.5px;margin-top:2px}
.req .body .src{font-size:11px;color:#9a917f;margin-top:5px}
.req .body .src::before{content:"出典: "}
.badges{display:flex;flex-direction:column;gap:5px;align-items:flex-end;min-width:120px}
.bdg{font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:2px 10px;border-radius:999px;white-space:nowrap}
.b-Must{background:var(--must);color:#fff}
.b-Should{background:var(--should);color:#fff}
.b-Could{background:#eef2e4;color:var(--could);border:1px solid var(--could)}
.b-Wont{background:#efece6;color:var(--wont);border:1px solid var(--wont);text-decoration:line-through}
.b-P1{background:#f3e9fa;color:var(--p1);border:1px solid var(--p1)}
.b-P2{background:#e6f0f7;color:var(--p2);border:1px solid var(--p2)}
.b-P3{background:#f0ede7;color:var(--p3);border:1px solid var(--p3)}
.metric{font-size:11px;color:var(--should);background:#eef5fa;border-radius:6px;padding:2px 8px;margin-top:5px;display:inline-block}
.metric::before{content:"指標: ";font-weight:700}
.empty{text-align:center;color:var(--ink-soft);padding:40px 0}
footer{margin-top:40px;border-top:1px solid var(--line);padding-top:14px;font-size:11px;color:#9a917f}
@media(max-width:640px){.req{grid-template-columns:1fr}.badges{flex-direction:row;align-items:center;justify-content:flex-start}}
</style>
</head>

-024","name":"私的複製整合設計","desc":"ユーザー持込音源のプライベート処理という文化庁平成27年報告書タイプ2整理に整合する設計を維持","cat":"法務・コンプライアンス","moscow":"Must","metric":"G3弁護士確認の回答に整合","source":"round1-legal-shiteki-fukusei"},{"id":"NF-025","name":"学習データのライセンスクリーン","desc":"CC BY-NC系データ(Saraga等)を商用学習に使わない。合成データ中心の学習戦略","cat":"法務・コンプライアンス","moscow":"Must","metric":"学習データ台帳で全ソースのライセンス確認済み","source":"Issue #9・round1-codex-papers(ライセンス表)"},{"id":"NF-026","name":"コピーレフト部品の分離","desc":"GPL部品(YourMT3等)の静的組込を回避。ライセンス不明部品(MIDI2ScoreTransformer)は不使用・論文ベース独自実装","cat":"法務・コンプライアンス","moscow":"Must","metric":"配布物の依存ライセンス監査パス","source":"round1-codex-papers(ライセンス表)"},{"id":"NF-027","name":"法務確認のリリース前提","desc":"G3弁護士4問の回答を設計に反映してから公開リリース","cat":"法務・コンプライアンス","moscow":"Must","metric":"4問の回答と設計対応表の作成","source":"conclusions-v5(G3)"},{"id":"NF-028","name":"利用規約の権利明確化","desc":"採譜結果の利用責任(私的利用の範囲・配布時の許諾)を利用規約で明確化","cat":"法務・コンプライアンス","moscow":"Should","metric":"規約に権利条項を明記・G3確認済み","source":"round1法務調査(AudioScore方式)"},{"id":"NF-029","name":"モデル・部品のライセンス台帳","desc":"エンジン部品ごとの出所・ライセンス・商用可否を台帳管理","cat":"モデル運用","moscow":"Must","metric":"全部品が台帳に記録され監査可能","source":"round1-codex-papers(ライセンス表)"},{"id":"NF-030","name":"配布モデルサイズ","desc":"オンデバイスモデルの配布可能なサイズ上限","cat":"モデル運用","moscow":"Could","metric":"数GB以内(仮)","source":"配布要件"},{"id":"NF-031","name":"学習の再現性","desc":"合成データ生成と学習パイプラインのバージョン管理・再現可能性","cat":"モデル運用","moscow":"Should","metric":"任意の配布モデルを再学習で再現可能","source":"EDD方針"}]};
const PH = DATA.meta.phases;
let tab = "f", q = "", selCat = null, selMos = null, selPh = null;
document.getElementById("position").textContent = DATA.meta.position;

function items(){ return tab === "f" ? DATA.functional : DATA.nonfunctional; }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function mosClass(m){ return "b-" + m.replace("'",""); }

function renderCards(){
  const f = DATA.functional, n = DATA.nonfunctional;
  const musts = f.concat(n).filter(x=>x.moscow==="Must").length;
  const p1 = f.filter(x=>x.phase==="P1").length;
  document.getElementById("cards").innerHTML =
    card(f.length,"機能要件","acc") + card(n.length,"非機能要件","acc") +
    card(musts,"Must（必須）","") + card(p1, PH.P1+" 対象","");
  function card(num,lbl,cls){ return `<div class="card ${cls}"><div class="num">${num}</div><div class="lbl">${lbl}</div></div>`; }
}

function chips(rowId, values, sel, onpick){
  const row = document.getElementById(rowId);
  row.querySelectorAll(".chip").forEach(c=>c.remove());
  const all = document.createElement("button");
  all.className = "chip" + (sel===null ? " on":""); all.textContent = "すべて";
  all.onclick = ()=>onpick(null); row.appendChild(all);
  values.forEach(v=>{
    const b = document.createElement("button");
    b.className = "chip" + (sel===v ? " on":"");
    b.textContent = rowId==="row-ph" ? PH[v] : v;
    b.onclick = ()=>onpick(sel===v ? null : v);
    row.appendChild(b);
  });
}

function render(){
  renderCards();
  const its = items();
  chips("row-cat", [...new Set(its.map(x=>x.cat))], selCat, v=>{selCat=v;render();});
  chips("row-mos", [...new Set(its.map(x=>x.moscow))], selMos, v=>{selMos=v;render();});
  document.getElementById("row-ph").style.display = tab==="f" ? "" : "none";
  if(tab==="f") chips("row-ph", ["P1","P2","P3"], selPh, v=>{selPh=v;render();});
  const ql = q.toLowerCase();
  const hit = its.filter(x=>
    (selCat===null || x.cat===selCat) &&
    (selMos===null || x.moscow===selMos) &&
    (tab!=="f" || selPh===null || x.phase===selPh) &&
    (ql==="" || (x.id+x.name+x.desc+x.source+(x.metric||"")).toLowerCase().includes(ql))
  );
  document.getElementById("count").textContent = `${hit.length} / ${its.length} 件を表示`;
  const byCat = {};
  hit.forEach(x=>{ (byCat[x.cat] = byCat[x.cat]||[]).push(x); });
  let html = "";
  for(const cat of Object.keys(byCat)){
    html += `<div class="catblock"><h2>${esc(cat)} <span class="n">${byCat[cat].length}件</span></h2>`;
    for(const x of byCat[cat]){
      html += `<div class="req"><div class="id">${x.id}</div><div class="body"><div class="nm">${esc(x.name)}</div><div class="ds">${esc(x.desc)}</div>`;
      if(x.metric && x.metric!=="—") html += `<span class="metric">${esc(x.metric)}</span>`;
      html += `<div class="src">${esc(x.source)}</div></div><div class="badges"><span class="bdg ${mosClass(x.moscow)}">${x.moscow}</span>`;
      if(x.phase) html += `<span class="bdg b-${x.phase}">${PH[x.phase]}</span>`;
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  document.getElementById("list").innerHTML = html || `<div class="empty">条件に一致する要件がありません</div>`;
}

document.getElementById("q").addEventListener("input", e=>{ q=e.target.value; render(); });
document.getElementById("tab-f").onclick = ()=>{ tab="f"; selCat=selMos=selPh=null; setTab(); };
document.getElementById("tab-n").onclick = ()=>{ tab="n"; selCat=selMos=selPh=null; setTab(); };
function setTab(){
  document.getElementById("tab-f").classList.toggle("active", tab==="f");
  document.getElementById("tab-n").classList.toggle("active", tab==="n");
  document.getElementById("tab-f").setAttribute("aria-selected", tab==="f");
  document.getElementById("tab-n").setAttribute("aria-selected", tab==="n");
  render();
}
render();
</script>
</body>

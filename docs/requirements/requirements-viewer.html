itique-grok(低音ズレ・弦数制約の欠落)"}, {"id": "F-080", "name": "五線+TAB連動表示・編集", "desc": "五線譜とTAB譜の同時表示と連動編集(片方の修正が他方へ反映)。TAB上でのフレット直接編集を含む", "cat": "記譜形式", "moscow": "Should", "phase": "P2", "source": "critique-grok(F-031/F-032統合要件)"}, {"id": "F-081", "name": "調整合ピッチスペリング", "desc": "推定キー・和声文脈に基づく異名同音(D#/E♭)の綴り正規化。調号と矛盾しない音名選択で臨時記号の散乱を抑制(手直し工数の最頻要因の一つ)", "cat": "リズム・整譜", "moscow": "Must", "phase": "P1", "source": "web-gap-scan(G-01: enharmonic chaos/2.25倍問題)"}, {"id": "F-082", "name": "装飾音・演奏ノイズの記譜解釈", "desc": "微小音価をグレースノート/前打音等の装飾記号候補として解釈し直す層。ブレス・弦のこすれ等の非楽音を音符化しない", "cat": "リズム・整譜", "moscow": "Should", "phase": "P2", "source": "web-gap-scan(G-02: 32分音符の羅列問題)"}, {"id": "F-083", "name": "小節・拍オフセット補正", "desc": "全体が8分遅れる等の系統的オフセットを一括検出・補正し、小節線と拍頭を再整列(rebarring/rebeaming)。AI推定テンポマップのずれに対し、手動同期点の追加と同期点間の自動補間によるユーザー補正導線を含む(Flat.io型先行例)", "cat": "リズム・整譜", "moscow": "Should", "phase": "P1", "source": "web-gap-scan(G-06: MusicRadar 8分ズレ)"}, {"id": "F-084", "name": "記譜前MIDIクリーンアップ工程", "desc": "量子化・音価・密度・不要音の削除を記譜化の前段のMIDIドラフトで確定させ、確定後に整譜する順序制御(記譜後XMLを解きほぐすより速い)", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "web-gap-scan(G-03: RiffToTab設計)"}, {"id": "F-085", "name": "ドラフト採用可否の事前判断支援", "desc": "音質診断(F-002)と信頼度分布から「この曲は手直しが多い可能性」を採譜前後に提示し、耳コピ学習モード(F-064)へ誘導", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "web-gap-scan(G-05: 45分vs20分問題)"}, {"id": "F-086", "name": "調内制約一括クレンジング", "desc": "推定スケール/調への制約を適用し、外れ音を一括補正候補として提示(Ableton audio-to-MIDIユーザーの実用ワークアラウンドの製品化)", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "grok-x-gap-scan(GAP-03)"}, {"id": "F-087", "name": "コード進行の同期プレイアロングUI", "desc": "再生ヘッドに追従するコードカード/タイムライン表示で、譜面編集をせずその場で合わせ弾きできる学習UI", "cat": "練習支援・付加価値", "moscow": "Should", "phase": "P2", "source": "grok-x-gap-scan(GAP-06: 高エンゲージ実例)"}, {"id": "F-088", "name": "既分離音源モード", "desc": "Moises等で分離済みのステムを直接持ち込み、フル分離を強制しない入力経路", "cat": "音声入力・前処理", "moscow": "Should", "phase": "P2", "source": "critique-grok(既分離ユーザーのUX)"}, {"id": "F-089", "name": "合法音 "phase": "P2", "source": "grok-x-gap-scan-v2(GAP-v2-01: SynthV/VOCALOID圏の強実需・翻唱MIDI)"}, {"id": "F-099", "name": "LLM/エージェント可読エクスポート", "desc": "小節・コード・声部を構造化したテキスト表現(拍グリッド+コード+音符列)をエクスポートし、外部LLMとの楽曲議論・修正指示に使える形式を定義。デバッグ用中間出力(NF-008)とは目的が異なる", "cat": "出力・エクスポート", "moscow": "Could", "phase": "P3", "source": "grok-x-gap-scan-v2(GAP-v2-04: moe-fumen/Strudel実例)"}, {"id": "F-100", "name": "移動ド(ソルフェージュ)記譜", "desc": "推定キーを基準にメロディを移動ド相対階名(ドレミ/Do-Re-Mi/数字)で表示・出力する。調が変わっても同一パターンで読める相対音感トレーニング向け記譜で、耳コピ学習モード(F-064)と接続。简谱(F-033=固定ド数字譜)とは別概念", "cat": "記譜形式", "moscow": "Could", "phase": "P3", "source": "web-gap-scan-v2(N-01: Qiita自作事例=未充足需要)"}, {"id": "F-101", "name": "鍵盤運指推定", "desc": "ピアノ譜への指番号候補の自動付与。右手/左手割当・複数正解の許容・ユーザー編集を含む(ギターTAB運指F-028の鍵盤版。教育用途)", "cat": "リズム・整譜", "moscow": "Could", "phase": "P3", "source": "codex-papers-gap-scan-v2(NEW-GAP-04: PIG/ThumbSet研究)"}, {"id": "F-102", "name": "サステインペダル検出・記譜", "desc": "ピアノ音源からのサステインペダル(CC64)検出と記譜(MusicXML pedal要素)。ペダルによる音価の伸長を量子化(F-021)と分離して扱い、音価過大の誤記譜を抑制する", "cat": "解析エンジン", "moscow": "Should", "phase": "P2", "source": "codex-papers-gap-scan-v2(NEW-GAP-05: MIREX 2024 pedal評価・MusicXML pedal)"}, {"id": "F-103", "name": "出力先ソフト別エクスポートプロファイル", "desc": "出力先ソフト(MuseScore/Dorico/Sibelius/Guitar Pro/Finale資産/その他)を選ぶと、そのソフトのインポート実装の癖(方言・対応要素・バージョン差)に合わせて出力を自動調整する。規格準拠(NF-011)に加えて実利用互換を保証する柔軟性層。Finaleは開発終了(2024/8)のため既存資産の読み込み互換に限定し、新規出力の最適化はDorico/MuseScoreを優先", "cat": "出力・エクスポート", "moscow": "Should", "phase": "P2", "source": "ユーザー決定(2026-07-19: どのソフトにも合わせて出力できる柔軟性)・NF-011関連"}, {"id": "F-104", "name": "全出力形式のオプション対応", "desc": "記譜法(五線/TAB/简谱/リードシート/ドラム譜/移動ド/ピアノロール等)とファイル形式(MusicXML/MIDI/Guitar Pro/PDF/UST・SynthV/ABC notation/LilyPond等)を、有効化可能なオプションモジュールとして全て提供することを目指す。個別形式の優先順は各要件(F-032/033/034/048/049/051/098等)に従い、本要件は全体ゴールを定義する", "cat": "出力・エクスポート", "moscow": "Should", "phase": "P3", "source": "ユーザー決定(2026-07-19: オプションで全出力形式に対応したい)"},{"id": "F-105", "name": "部分結果の先出し表示", "desc": "解析完了を待たず、確定したセクションから譜面を逐次描画（skeleton→実譜面）。停滞しない段階ラベルつき前進バー（ステム分離→拍推定→整譜）と組。成功指標「初回30秒で譜面が見える」", "cat": "編集UI", "moscow": "Should", "phase": "P1", "source": "uiux-direction・ユーザー承認2026-07-19(C層の中心・待ち時間設計)"},{"id": "F-106", "name": "ワンパス結果画面", "desc": "分離→MIDI→コード→楽譜を一本の導線として提示する解析完了後のレイアウト。各表現（ステム/MIDI/コード/譜面）へ1操作で到達。結果画面レイアウトの詳細は画面設計フェーズの最優先論点として保留(uiux-direction §9未決の台帳化)", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "uiux-direction・ユーザー承認2026-07-19(grok Top10#1: Logicの一体感)"},{"id": "F-107", "name": "自動整譜のワンクリックロック", "desc": "自動レイアウト・自動改行・衝突回避を範囲単位でロックし手動優先に切替できる。「勝手なこと」ストレスの構造的対策", "cat": "リズム・整譜", "moscow": "Should", "phase": "P2", "source": "uiux-direction・ユーザー承認2026-07-19(grok F11・アンチパターン#4)"},{"id": "F-108", "name": "フィールド録音モード（日常音の採譜）", "desc": "雑音を含む日常録音（フィールド録音・スマホ録音）から音程を持つ成分だけを選択的に抽出して音符化し、非音程成分（雨・足音等）は分類して正直に報告する。絶対音感エミュレータのビジョン直結機能。拾えたものだけを信頼度つきで出す（F-043連動）。受入条件: (1)音事件を分類タグ(pitched_stable/pitched_transient/noisy/speech/poly/inharmonic)で返し、noisy/inharmonicは音符化せず音響オブジェクトとして保持 (2)受入デモ3種=ノック音の当たり/外れ/判断不能が説明可能・雨+口ずさみで口ずさみだけ五線化・エアコンhumを主旋律に混入しない (3)デフォルトは単音抽出優先・和音分解はオンデマンド(失望防止)", "cat": "音声入力・前処理", "moscow": "Must", "phase": "P1", "source": "product-vision(絶対音感エミュレータ・ユーザー2026-07-19)"},{"id": "F-109", "name": "共有用ビジュアルカード生成", "desc": "解析結果を「波形＋抽出音符の重畳カード」(audiogram形式の静止画/短尺動画)として端末内で生成しSNS共有できる。日常音採譜の魔法の可視化。競合に先行例のない空白領域。端末内生成・ユーザー自身の共有操作のため成果物非関与構造(NF-023)の範囲内", "cat": "出力・エクスポート", "moscow": "Should", "phase": "P2", "source": "waveform-grok-x(audiogram=SNS音声流通の定石)・waveform-web(波形+音符の重畳は空白領域)"},{"id": "F-110", "name": "波形ビュー（意味付きカラー・LOD描画）", "desc": "波形そのものの表示体系。レイヤ/帯域による意味色分け（単色でなく「読める」波形）・事前計算ピーク→ズーム別ミップマップ→可視範囲のみ描画の3段構え（24時間音源=NF-006でも破綻しない）・超ズーム時のゼロクロスガイド線。F-041（スペクトログラム段）・F-042（同期再生の挙動）と分担し、本要件は波形表示の体系を担う", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "uiux-direction §8-1・waveform-grok-x(盗むべき#1/#3)・waveform-web(描画スタック)"},{"id": "F-111", "name": "波形上の範囲選択・ループ編集", "desc": "波形上での範囲選択・カット・ループ指定。ゼロクロス吸着（振幅ゼロ点=プチッというノイズが出ない位置への自動吸い付き）でプロ品質の操作感を実現。F-042の自動ループ（再生側）と分担し、本要件はユーザー主導の範囲操作を担う", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "uiux-direction §8-1・waveform-grok-x(盗むべき#4)"},{"id": "F-112", "name": "録音レベルメーター（VU針・隔離文脈）", "desc": "マイク/ライン録音（F-005）時の入力レベル表示。VU針バリスティクス（300ms時定数=耳の感覚に近い「暴れない」動き）＋クリップ（音割れ）発生の永続バッジ（F-002連動）。録音モーダル内の隔離文脈に限定し、常設キャンバスには置かない（ノスタルジー方針§8-3の実装第1号）", "cat": "音声入力・前処理", "moscow": "Should", "phase": "P2", "source": "uiux-direction §8-2/8-3・instruments-ui-codex(VU時定数)・instruments-ui-web(隔離文脈)"},{"id": "F-113", "name": "範囲再解析と候補選択", "desc": "小節/範囲単位で「採用・別候補・手修正・この範囲だけ再解析」を選べる。全曲やり直しではなく怪しい箇所だけAIに再挑戦させる、進化する下書き（C層）の中核操作", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "uiux-direction §2 C層"},{"id": "F-114", "name": "非破壊編集3レイヤー", "desc": "原音・AI下書き・人間編集を独立レイヤーで保持し、いつでもAI下書きや原音に立ち返れる非破壊構造。F-046（アンドゥ・版管理=時間軸の履歴）と分担し、本要件はレイヤー構造を担う。成功指標「UndoでAI再解析前に戻れる」の構造的土台", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "uiux-direction §2 C層・§5成功指標"},{"id": "F-115", "name": "コマンドパレットとショートカット体系", "desc": "全主要操作へのショートカット割当と、操作名を打って呼び出すコマンドパレット。キーボード第一（A層）の実装。F-047（キーボードでの音符入力）と分担し、本要件は操作系全体を担う。NF-049（キー配列のロケール耐性）と組", "cat": "編集UI", "moscow": "Should", "phase": "P2", "source": "uiux-direction §2 A層"},{"id": "F-116", "name": "音符・波形融合ビュー（ブロブ表示）", "desc": "Melodyne型の、音符と波形が一体化したブロブ（音のかたまり）表示のビューモード。低信頼音符はシルエット表現（色+形）。F-041で参考実装としたものを独立の編集ビューへ昇格させる将来オプション", "cat": "編集UI", "moscow": "Could", "phase": "P3", "source": "uiux-direction §8-1・waveform-web(Melodyne検証)"},{"id": "F-117", "name": "ピッチ偏差の計器型表示", "desc": "選択した音符が12平均律（ドレミの標準の高さ）からどれだけズレているかを中央ゼロの計器型＋cents数値の冗長表示で示す。ボーカルのしゃくり・ギターのベンド等の微細なピッチ精査用。F-077（楽器チューニングの偏差）・F-041（ピッチ曲線）と分担し、本要件は音符単位の精査を担う", "cat": "編集UI", "moscow": "Could", "phase": "P3", "source": "uiux-direction §8-2・instruments-ui-codex(中央ゼロ優位の人間工学)"}], "nf": [{"id": "NF-001", "name": "オフライン完全動作", "desc": "ネットワーク切断時も採譜・編集・出力の全コア機能が動作する", "cat": "可用性", "moscow": "Must", "metric": "コア機能のオフライン動作率100%", "source": "conclusions-v5(成果物非関与)・AnthemScore買切支持"}, {"id": "NF-002", "name": "作業の自動保存", "desc": "編集内容の自動保存と "name": "UI音の設計原則", "desc": "UI効果音はデフォルト極小・個別オフ可・原音再生中は自動抑制・成功音は1回のみ", "cat": "アクセシビリティ・国際化", "moscow": "Should", "metric": "全UI音が設定で個別無効化できる", "source": "uiux-direction・ユーザー承認2026-07-19(3者合意: 音は非侵襲)"},{"id": "NF-049", "name": "キーマップのロケール耐性", "desc": "日本語配列等でショートカットが崩壊しない(物理キー基準のバインド+ロケール別キーマップ)。キーボード第一方針の前提", "cat": "アクセシビリティ・国際化", "moscow": "Should", "metric": "JIS/US配列で全ショートカット動作", "source": "uiux-direction・ユーザー承認2026-07-19(grok F12: 実害の一次報告)"},{"id": "NF-050", "name": "二層アーキテクチャ原則（耳=楽器非依存/記譜=プロファイル）", "desc": "解析エンジン層（音→音程イベント+信頼度）は楽器の概念を持たず、楽器・記譜法依存の処理（弦/フレット割当・キット割当・左右手分割等）はすべて出力プロファイル層（NF-045）に隔離する。プロダクトコアの物語の設計原則。NF-007パイプライン分離の上位原則", "cat": "性能・拡張性", "moscow": "Must", "metric": "エンジン層のコードに楽器固有分岐が存在しない（レビューで検証）", "source": "product-vision(二層構造・ユーザー2026-07-19)"}]};
let tab="f",cat="",mos="",ph="",q="";
const PH=D.meta.phases;
function chips(el,vals,cur,fn){el.innerHTML=vals.map(v=>`<button class="chip${v===cur?" on":""}" data-v="${v}">${v||"すべて"}</button>`).join("");
 el.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{fn(b.dataset.v===cur?"":b.dataset.v);render()})}
function rows(){return tab==="f"?D.f:D.nf}
function render(){
 const cats=[...new Set(rows().map(r=>r.cat))];
 chips(document.getElementById("fcat"),["",...cats],cat,v=>cat=v);
 chips(document.getElementById("fmos"),["","Must","Should","Could","Won't"],mos,v=>mos=v);
 document.getElementById("fph").parentElement.style.display=tab==="f"?"":"none";
 if(tab==="f")chips(document.getElementById("fph"),["","P1","P2","P3"].map(p=>p),ph,v=>ph=v);
 let rs=rows().filter(r=>(!cat||r.cat===cat)&&(!mos||r.moscow===mos)&&(tab==="nf"||!ph||r.phase===ph));
 if(q){const s=q.toLowerCase();rs=rs.filter(r=>(r.id+r.name+r.desc+r.source+(r.metric||"")).toLowerCase().includes(s))}
 document.getElementById("count").textContent=`${rs.length}件表示 / 全${rows().length}件`;
 const byCat={};rs.forEach(r=>{(byCat[r.cat]=byCat[r.cat]||[]).push(r)});
 document.getElementById("list").innerHTML=Object.entries(byCat).map(([c,items])=>
  `<h2 class="cat">${c}（${items.length}）</h2>`+items.map(r=>`<div class="req"><div class="top">
  <span class="rid">${r.id}</span><span class="nm">${r.name}</span>
  <span class="badge b-${r.moscow.replace("'","")}">${r.moscow}</span>
  ${r.phase?`<span class="badge b-${r.phase}">${PH[r.phase]}</span>`:""}</div>
  <div class="ds">${r.desc}</div>${r.metric?`<div class="mt">指標: ${r.metric}</div>`:""}
  <div class="src">出典: ${r.source}</div></div>`).join("")).join("");
 const f=D.f,mf=m=>f.filter(r=>r.moscow===m).length;
 document.getElementById("cards").innerHTML=[[f.length,"機能要件"],[D.nf.length,"非機能要件"],[mf("Must"),"Must(機能)"],[f.filter(r=>r.phase==="P1").length,"Phase1 スパイク"],[mf("Won't"),"Won't(捨てる判断)"]]
  .map(([n,l])=>`<div class="card"><b>${n}</b><span>${l}</span></div>`).join("");
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("on",b.dataset.t===tab));
}
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>{tab=b.dataset.t;cat="";mos="";ph="";render()});
document.getElementById("q").oninput=e=>{q=e.target.value;render()};
render();
</script></body></html>

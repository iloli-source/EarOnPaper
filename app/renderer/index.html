<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'self' filesystem:; frame-src 'self' filesystem:;">
  <title>EarOnPaper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="titlebar">
      <span class="titlebar-title">EarOnPaper</span>
    </div>

    <main class="main">

      <!-- IDLE: ドロップゾーン -->
      <div id="state-idle" class="state active">
        <div class="dropzone" id="dropzone">
          <div class="waveform">
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
            <div class="waveform-bar"></div>
          </div>
          <div class="drop-label">音声ファイルをここにドロップ</div>
          <div class="drop-sub">または</div>
          <button class="btn-open" id="btn-open">ファイルを選ぶ</button>
          <div class="drop-formats">wav · mp3 · flac · m4a · aiff</div>
        </div>
        <!-- #128: URL取り込み(F-006裁定変更・yt-dlpローカル実行) -->
        <div class="url-row">
          <input type="url" class="url-input" id="url-input"
                 placeholder="または YouTube等の動画URLを貼り付け" spellcheck="false">
          <button class="btn-open" id="btn-url">URLから取り込む</button>
        </div>
        <div class="url-note">取り込みは私的利用の範囲で行ってください。サイトの利用規約・楽曲の著作権はご自身の責任です（楽譜の公開・配布には権利処理が必要な場合があります）</div>
      </div>

      <!-- PROCESSING: 処理中 -->
      <div id="state-processing" class="state">
        <!-- 背景: 宇宙(星空)＋中央に吸い込まれる音符 -->
        <div class="starfield" id="starfield" aria-hidden="true"></div>
        <div class="space-core" aria-hidden="true"></div>
        <div class="notes-bg" id="notes-bg" aria-hidden="true"></div>

        <!-- 前面: ステージ情報 -->
        <div class="stage-hud">
          <div class="stage-label" id="stage-label">音声読み込み中...</div>
          <div class="processing-file" id="processing-file"></div>
          <div class="stage-progress-wrap">
            <div class="stage-progress-bar" id="stage-progress-bar"></div>
          </div>
          <div class="stage-steps">
            <div class="stage-step" data-stage="0"><div class="stage-dot"></div><span>読み込み</span></div>
            <div class="stage-connector"></div>
            <div class="stage-step" data-stage="1"><div class="stage-dot"></div><span>音高検出</span></div>
            <div class="stage-connector"></div>
            <div class="stage-step" data-stage="2"><div class="stage-dot"></div><span>量子化</span></div>
            <div class="stage-connector"></div>
            <div class="stage-step" data-stage="3"><div class="stage-dot"></div><span>楽譜生成</span></div>
            <div class="stage-connector"></div>
            <div class="stage-step" data-stage="4"><div class="stage-dot"></div><span>PDF出力</span></div>
          </div>
        </div>
      </div>

      <!-- DONE: 完了 -->
      <div id="state-done" class="state">
        <div class="score-panel" id="score-panel">
          <div class="score-placeholder" id="score-placeholder">
            <span>📄</span>
            <span>楽譜を読み込み中...</span>
          </div>
        </div>
        <div class="sidebar">
          <!-- 楽器スイッチャ: 分離で抽出できた楽器を切り替える -->
          <div class="result-card">
            <div class="result-card-title">楽器</div>
            <div class="instrument-switch" id="instrument-switch"></div>
          </div>

          <!-- 表示切替(コード譜/TAB/五線譜。コード譜は一次導線) -->
          <div class="result-card" id="view-toggle-card" hidden>
            <div class="result-card-title">表示</div>
            <div class="view-toggle" id="view-toggle">
              <button class="view-btn active" data-view="chord">コード譜</button>
              <button class="view-btn" data-view="tab">TAB譜</button>
              <button class="view-btn" data-view="staff">五線譜</button>
              <button class="view-btn" data-view="analysis">解析</button>
            </div>
          </div>

          <div class="result-card">
            <div class="result-card-title">採譜結果</div>
            <div class="result-stat">
              <span class="result-stat-label">音符数</span>
              <span class="result-stat-value" id="stat-notes">—</span>
            </div>
            <div class="result-stat">
              <span class="result-stat-label">テンポ</span>
              <span class="result-stat-value" id="stat-bpm">—</span>
            </div>
            <div class="result-stat">
              <span class="result-stat-label">エンジン</span>
              <span class="result-stat-value" id="stat-engine">—</span>
            </div>
          </div>

          <div class="result-card">
            <div class="result-card-title">エクスポート</div>
            <div class="export-buttons">
              <button class="btn-export" id="btn-export-chord">
                <span class="btn-export-icon">🎵</span>コード譜（PDF）
              </button>
              <button class="btn-export" id="btn-export-pdf">
                <span class="btn-export-icon">📄</span>五線譜（PDF）
              </button>
              <button class="btn-export" id="btn-export-tab">
                <span class="btn-export-icon">🎸</span>TAB譜（PDF）
              </button>
              <button class="btn-export" id="btn-export-midi">
                <span class="btn-export-icon">🎹</span>MIDI
              </button>
              <button class="btn-export" id="btn-export-analysis">
                <span class="btn-export-icon">🔍</span>解析ビュー（PDF）
              </button>
            </div>
          </div>

          <!-- 詳細設定(任意): 分かる人はBPM/拍子/キーを指定すると採譜精度が上がる -->
          <div class="result-card">
            <div class="result-card-title">詳細設定（任意）</div>
            <div class="opt-row">
              <label class="opt-label">BPM</label>
              <select class="opt-select" id="opt-bpm">
                <option value="">自動</option>
                <option value="30-60">30–60</option>
                <option value="60-90">60–90</option>
                <option value="90-120">90–120</option>
                <option value="120-240">120以上</option>
              </select>
            </div>
            <div class="opt-row">
              <label class="opt-label">拍子</label>
              <select class="opt-select" id="opt-beat">
                <option value="">自動</option>
                <option value="4/4">4/4</option>
                <option value="3/4">3/4</option>
                <option value="2/4">2/4</option>
              </select>
            </div>
            <div class="opt-row">
              <label class="opt-label">キー</label>
              <select class="opt-select" id="opt-key">
                <option value="">自動</option>
                <option>C</option><option>C#</option><option>D</option><option>D#</option>
                <option>E</option><option>F</option><option>F#</option><option>G</option>
                <option>G#</option><option>A</option><option>A#</option><option>B</option>
              </select>
              <select class="opt-select" id="opt-mode">
                <option value="major">major</option>
                <option value="minor">minor</option>
              </select>
            </div>
            <button class="btn-export" id="btn-reapply">
              <span class="btn-export-icon">🔁</span>この設定で採譜し直す
            </button>
            <div class="opt-hint">未選択の項目は自動検出のままです</div>
          </div>

          <button class="btn-retry" id="btn-retry">← 別のファイルを採譜</button>
        </div>
      </div>

      <!-- ERROR: エラー -->
      <div id="state-error" class="state">
        <div class="error-icon">⚠️</div>
        <div class="error-title">採譜に失敗しました</div>
        <pre class="error-message" id="error-message"></pre>
        <button class="btn-copy-error" id="btn-copy-error">エラーをコピー</button>
        <button class="btn-back" id="btn-error-back">最初に戻る</button>
      </div>

    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ear-pipeline:
    name: Pitchsieve tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: spike/ear-pipeline/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install dependencies
        working-directory: spike/ear-pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff==0.15.22

      - name: Lint (dead code / unused imports)
        working-directory: spike/ear-pipeline
        run: ruff check --select F earpipe/

      - name: Orphan export gate (実装したが未配線の機能を検出)
        working-directory: spike/ear-pipeline
        run: python scripts/check_orphan_exports.py

      - name: Run tests
        working-directory: spike/ear-pipeline
        run: python -m pytest tests/ -q

  ai-ears:
    name: AI ears tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: tools/ai-ears/requirements.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install dependencies
        working-directory: tools/ai-ears
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        working-directory: tools/ai-ears
        run: python -m pytest tests/ -q


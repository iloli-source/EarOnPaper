<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>採譜 体験テスト</title>
<style>
  /* プロトタイプ(microinteractions.html)準拠トークン — 静かな工房60% */
  :root{
    --bg:#101216; --surface:#171a20; --surface2:#1e222a; --line:#2a2f3a;
    --text:#c9d1e0; --text-dim:#7d879a;
    --c-play:#4c8dff;   /* 青=再生/ナビ */
    --c-ok:#3ecf8e;     /* 緑=確定 */
    --c-warn:#e8b23d;   /* 琥珀=要確認 */
    --c-err:#e5534b;    /* 赤=別物 */
    --dur:80ms; --ease:cubic-bezier(.2,.8,.3,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP",sans-serif;
    font-size:13px;line-height:1.6;
  }
  header{padding:20px 24px 14px;border-bottom:1px solid var(--line);background:var(--surface)}
  header h1{font-size:15px;font-weight:600;letter-spacing:.02em}
  header p{color:var(--text-dim);font-size:11px;margin-top:2px}
  main{max-width:820px;margin:0 auto;padding:20px 16px 96px}

  /* 4ステップガイド */
  .steps{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px}
  .step{flex:1;padding:10px 8px;text-align:center;font-size:11px;color:var(--text-dim);border-right:1px solid var(--line)}
  .step:last-child{border-right:none}
  .step b{display:block;font-size:15px;color:var(--c-play);font-weight:600}

  /* 解析進行バナー（進化する下書き: 段階ラベルつき前進バー） */
  #procbanner{display:none;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:16px}
  #procbanner.on{display:block}
  #stagebar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:8px}
  #stagefill{height:100%;width:0%;background:var(--c-play);border-radius:3px;transition:width .4s linear}
  #stagelabel{font-size:11px;color:var(--text-dim)}
  #stagelabel b{color:var(--text);font-weight:600}

  /* 曲カード */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:10px;margin-bottom:20px;overflow:hidden}
  .card-head{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--line)}
  .card-head .band{width:5px;height:18px;border-radius:3px;background:var(--c-play)}
  .card-head b{font-size:13px;font-weight:600}
  .card-head .meta{margin-left:auto;font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums}

  /* 波形プレイヤー（生きた波形: 再生ヘッド同期） */
  .wf-row{padding:12px 16px 6px}
  .wf-row:last-of-type{padding-bottom:12px}
  .wf-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;margin-bottom:6px}
  .wf-label .dot{width:7px;height:7px;border-radius:50%}
  .wf-row.original .wf-label{color:var(--text-dim)}
  .wf-row.original .dot{background:var(--text-dim)}
  .wf-row.render .wf-label{color:var(--c-play)}
  .wf-row.render .dot{background:var(--c-play)}
  .wf-body{display:flex;align-items:center;gap:10px}
  .play-btn{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
    transition:transform var(--dur) var(--ease),background var(--dur),border-color var(--dur);
  }
  .play-btn:hover{background:#242936;border-color:var(--c-play)}
  .play-btn:active{transform:scale(.94)}
  .play-btn.playing{background:var(--c-play);border-color:transparent;color:#fff}
  .wavewrap{position:relative;flex:1;height:56px;background:var(--surface2);border-radius:8px;overflow:hidden;cursor:pointer}
  .wavewrap canvas{position:absolute;inset:0;width:100%;height:100%}
  .playhead{
    position:absolute;top:0;bottom:0;left:0;width:2px;background:var(--c-play);
    opacity:0;will-change:transform;box-shadow:0 0 8px rgba(76,141,255,.7);pointer-events:none;
  }
  .wf-time{font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums;width:72px;text-align:right;flex-shrink:0}

  /* 楽譜（白ページをダークに浮かせる） */
  .score-section{border-top:1px solid var(--line);background:var(--surface)}
  .score-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;gap:10px;flex-wrap:wrap}
  .score-tabs{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--line);border-radius:8px;padding:2px}
  .score-tabs button{
    border:none;background:transparent;color:var(--text-dim);
    padding:5px 14px;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;
    transition:background var(--dur),color var(--dur);
  }
  .score-tabs button.active{background:var(--c-play);color:#fff}
  .score-tabs button:disabled{opacity:.35;cursor:default}
  .chord-toggle{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
  .chord-toggle input{cursor:pointer}
  .score-pager{display:flex;align-items:center;gap:6px}
  .page-btn{
    width:30px;height:30px;border-radius:50%;border:1px solid var(--line);
    background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;
    transition:transform var(--dur) var(--ease),border-color var(--dur),background var(--dur);
  }
  .page-btn:hover:not(:disabled){border-color:var(--c-play);background:#242936}
  .page-btn:active:not(:disabled){transform:scale(.94)}
  .page-btn:disabled{opacity:.3;cursor:default}
  .page-indicator{font-size:11px;color:var(--text-dim);min-width:48px;text-align:center;font-variant-numeric:tabular-nums}
  .score-pdf-link{font-size:10px;color:var(--c-play);text-decoration:none}
  .score-pdf-link:hover{text-decoration:underline}
  .score-viewer{padding:0 16px 14px;display:flex;justify-content:center}
  .score-viewer img{
    width:100%;max-width:620px;border-radius:4px;background:white;display:block;
    box-shadow:0 4px 24px rgba(0,0,0,.5);
  }

  /* 判定（色+形状の二重符号化） */
  .judge{padding:16px;border-top:1px solid var(--line)}
  .judge-q{font-size:13px;font-weight:600;margin-bottom:4px}
  .judge-hint{font-size:10px;color:var(--text-dim);margin-bottom:10px}
  .judge-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .judge-btns button{
    flex:1;min-width:110px;padding:11px 8px;border-radius:9px;
    font-size:12px;font-weight:600;cursor:pointer;position:relative;overflow:visible;
    background:var(--surface2);color:var(--text-dim);border:1.5px solid var(--line);
    transition:transform var(--dur) var(--ease),border-color .2s var(--ease),background .2s var(--ease),color .2s var(--ease);
  }
  .judge-btns button:hover{transform:translateY(-1px);border-color:var(--text-dim)}
  .judge-btns button:active{transform:scale(.97)}
  .judge-btns button.sel-same{border:1.5px solid var(--c-ok);background:rgba(62,207,142,.12);color:var(--c-ok)}
  .judge-btns button.sel-part{border:1.5px dashed var(--c-warn);background:rgba(232,178,61,.10);color:var(--c-warn)}
  .judge-btns button.sel-diff{border:1.5px dotted var(--c-err);background:rgba(229,83,75,.10);color:var(--c-err)}
  .memo-label{font-size:10px;color:var(--text-dim);margin-bottom:4px}
  textarea{
    width:100%;min-height:52px;background:var(--surface2);color:var(--text);
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    font:inherit;font-size:12px;resize:vertical;
  }
  textarea:focus{outline:none;border-color:var(--c-play)}
  textarea::placeholder{color:#525b6b}

  /* フッター */
  .footer-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:var(--surface);border-top:1px solid var(--line);
    padding:10px 20px;display:flex;justify-content:space-between;align-items:center;gap:12px;
  }
  .progress{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .export-btn{
    background:var(--c-play);color:#fff;border:none;border-radius:8px;
    padding:9px 20px;font-size:12px;font-weight:600;cursor:pointer;
    transition:transform var(--dur) var(--ease),opacity .2s,filter var(--dur);
  }
  .export-btn:hover:not(:disabled){filter:brightness(1.08)}
  .export-btn:active:not(:disabled){transform:scale(.97)}
  .export-btn:disabled{opacity:.3;cursor:default}

  /* トースト + 淡い祝祭（弾ける歓び10%: 達成の点のみ） */
  #toast{
    position:fixed;bottom:64px;left:50%;transform:translate(-50%,10px);
    background:var(--surface2);border:1px solid var(--c-ok);color:var(--c-ok);
    border-radius:9px;padding:9px 18px;font-size:12px;font-weight:600;
    opacity:0;pointer-events:none;transition:opacity .25s var(--ease),transform .25s var(--ease);z-index:60;
  }
  #toast.show{opacity:1;transform:translate(-50%,0)}
  .burst{position:fixed;width:5px;height:5px;border-radius:50%;pointer-events:none;will-change:transform,opacity;z-index:70}

  .no-songs{text-align:center;padding:56px 16px;color:var(--text-dim);font-size:12px}
  .saved-note{font-size:10px;color:var(--c-ok);margin-left:8px;opacity:0;transition:opacity .3s}
  .saved-note.show{opacity:1}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
<header>
  <h1>🎼 採譜 体験テスト</h1>
  <p>元の音源と、AIが採譜した結果の再生音を聴き比べて判定します。楽譜は読まなくてOKです。</p>
</header>
<main>
  <div class="steps">
    <div class="step"><b>①</b>元の録音を聴く</div>
    <div class="step"><b>②</b>採譜結果を聴く</div>
    <div class="step"><b>③</b>3択で判定</div>
    <div class="step"><b>④</b>書き出す</div>
  </div>
  <div id="procbanner">
    <div id="stagelabel"><b id="stagesong"></b> <span id="stagetext"></span></div>
    <div id="stagebar"><div id="stagefill"></div></div>
  </div>
  <div id="cards"></div>
</main>
<div class="footer-bar">
  <span class="progress" id="progress"></span>
  <button class="export-btn" id="export" disabled>④ 判定結果を書き出す</button>
</div>
<div id="toast">書き出し成功 — 判定結果を保存しました</div>

<script src="manifest.js"></script>
<script>
"use strict";
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;

function encPath(p){return p.split('/').map(s=>encodeURIComponent(s)).join('/');}
function fmtTime(s){if(!isFinite(s))return '0:00';const m=Math.floor(s/60),ss=Math.floor(s%60);return `${m}:${String(ss).padStart(2,'0')}`;}

/* WebAudio極小ブリップ（プロトタイプ流用。非侵襲: 極小音量・1回） */
let AC=null;function ac(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();return AC;}
function blip(freq,dur=0.12,gain=0.04){if(RM)return;try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(gain,c.currentTime);g.gain.exponentialRampToValueAtTime(1e-4,c.currentTime+dur);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+dur);}catch(e){}}
function readyChime(){blip(660,0.10,0.04);setTimeout(()=>blip(990,0.16,0.04),90);}

/* 淡い祝祭バースト（達成の点のみ・1回） */
function burstAt(x,y,color){
  if(RM)return;
  for(let i=0;i<8;i++){
    const d=document.createElement('div');d.className='burst';d.style.background=color;
    d.style.left=x+'px';d.style.top=y+'px';document.body.appendChild(d);
    const ang=Math.PI*2*i/8+Math.random()*0.4,dist=22+Math.random()*14;
    d.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px) scale(.4)`,opacity:0}
    ],{duration:450,easing:'cubic-bezier(.2,.8,.3,1)'}).onfinish=()=>d.remove();
  }
}

/* ================= データ・状態 ================= */
const KEY='pitchsieve-usertest-v1';
const store=JSON.parse(localStorage.getItem(KEY)||'{}');
const CHOICES=[
  {id:'same',label:'◯ 同じ曲に聞こえる',cls:'sel-same',color:'#3ecf8e'},
  {id:'part',label:'◔ 部分的に同じ',cls:'sel-part',color:'#e8b23d'},
  {id:'diff',label:'✕ 別物に聞こえる',cls:'sel-diff',color:'#e5534b'},
];
function save(){localStorage.setItem(KEY,JSON.stringify(store));updateProgress();}

const songs=window.MANIFEST?.songs||[];
const cards=document.getElementById('cards');
if(!songs.length){cards.innerHTML='<div class="no-songs">音源がまだ処理されていません。input/ フォルダに音源を入れて採譜を実行してください。</div>';}

/* 同時再生を許可（ユーザー要望 2026-07-20: 元音源と採譜音を重ねて聴き比べたい） */
function stopOthers(_a){}

/* ================= 波形プレイヤー ================= */
function buildWave(row,src,peaks,color,label,songTitle){
  const btn=row.querySelector('.play-btn');
  const wrap=row.querySelector('.wavewrap');
  const canvas=row.querySelector('canvas');
  const head=row.querySelector('.playhead');
  const timeEl=row.querySelector('.wf-time');
  const audio=new Audio(src);audio.preload='metadata';

  function draw(){
    const dpr=devicePixelRatio||1;
    const w=wrap.clientWidth,h=wrap.clientHeight;
    canvas.width=w*dpr;canvas.height=h*dpr;
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle=color;
    const n=peaks.length,bw=w/n,mid=h/2;
    for(let i=0;i<n;i++){
      const ph=Math.max(1.5,peaks[i]*(h-8));
      ctx.globalAlpha=0.85;
      ctx.fillRect(i*bw,mid-ph/2,Math.max(1,bw*0.7),ph);
    }
    ctx.globalAlpha=1;
  }
  draw();
  addEventListener('resize',draw);

  function setPlaying(on){
    btn.classList.toggle('playing',on);
    btn.textContent=on?'❚❚':'▶';
    head.style.opacity=on?1:0;
  }
  let raf=null;
  function tick(){
    if(!audio.paused){
      const frac=audio.duration?audio.currentTime/audio.duration:0;
      head.style.transform=`translateX(${frac*wrap.clientWidth}px)`;
      timeEl.textContent=`${fmtTime(audio.currentTime)} / ${fmtTime(audio.duration)}`;
      raf=requestAnimationFrame(tick);
    }
  }
  audio.addEventListener('loadedmetadata',()=>{timeEl.textContent=`0:00 / ${fmtTime(audio.duration)}`;});
  audio.addEventListener('play',()=>{
    stopOthers(audio);setPlaying(true);tick();
    if('mediaSession' in navigator){
      navigator.mediaSession.metadata=new MediaMetadata({title:`${songTitle} — ${label}`,artist:'採譜 体験テスト'});
    }
  });
  audio.addEventListener('pause',()=>{setPlaying(false);cancelAnimationFrame(raf);});
  audio.addEventListener('ended',()=>{setPlaying(false);cancelAnimationFrame(raf);});
  btn.onclick=()=>{audio.paused?audio.play():audio.pause();};
  wrap.onclick=e=>{
    if(!audio.duration)return;
    const r=wrap.getBoundingClientRect();
    audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;
    head.style.transform=`translateX(${(e.clientX-r.left)}px)`;
    if(audio.paused)audio.play();
  };
  return audio;
}

/* ================= 曲カード ================= */
songs.forEach((song,i)=>{
  const rec=store[song.id]=store[song.id]||{verdict:null,note:''};
  const card=document.createElement('section');card.className='card';
  const meta=[
    song.engine==='poly'?'多声エンジン':'単音エンジン',
    song.n_notes!=null?`音符 ${song.n_notes}個`:'',
    song.processing_sec!=null?`処理 ${Math.round(song.processing_sec)}秒`:'',
    song.n_chords?`コード ${song.n_chords}個検出`:'',
    song.n_octave_shifted?`TAB: ${song.n_octave_shifted}音をギター音域へオクターブ移動`:'',
    song.n_tab_dropped?`TAB: ${song.n_tab_dropped}音は載せられずドロップ`:'',
  ].filter(Boolean).join(' ・ ');

  card.innerHTML=`
    <div class="card-head"><span class="band"></span><b>曲 ${i+1}</b><span class="meta">${meta}</span></div>
    <div class="wf-row original">
      <div class="wf-label"><span class="dot"></span>① 元の録音</div>
      <div class="wf-body">
        <button class="play-btn">▶</button>
        <div class="wavewrap"><canvas></canvas><div class="playhead"></div></div>
        <span class="wf-time">--:--</span>
      </div>
    </div>
    <div class="wf-row render">
      <div class="wf-label"><span class="dot"></span>② AIの採譜結果（再生音）</div>
      <div class="wf-body">
        <button class="play-btn">▶</button>
        <div class="wavewrap"><canvas></canvas><div class="playhead"></div></div>
        <span class="wf-time">--:--</span>
      </div>
    </div>
    <div class="score-section">
      <div class="score-nav">
        <div class="score-tabs">
          <button class="mode-staff active">五線譜</button>
          <button class="mode-tab">TAB譜</button>
        </div>
        <label class="chord-toggle" style="display:none"><input type="checkbox" class="cd-check" checked> コードの押さえ図</label>
        <div class="score-pager">
          <button class="page-btn prev">‹</button>
          <span class="page-indicator">— / —</span>
          <button class="page-btn next">›</button>
        </div>
        <a class="score-pdf-link" href="${encPath(song.pdf)}" target="_blank">PDFで開く ↗</a>
      </div>
      <div class="score-viewer"><img alt="楽譜"></div>
    </div>
    <div class="judge">
      <div class="judge-q">③ ①と②、同じ曲に聞こえましたか？<span class="saved-note">✓ 保存</span></div>
      <div class="judge-hint">①と②を聴いてから、下の3つのどれかをクリックしてください</div>
      <div class="judge-btns"></div>
      <div class="memo-label">気づいたこと（任意）</div>
      <textarea placeholder="例: メロディは合ってるけどリズムがずれてた、など">${rec.note}</textarea>
    </div>`;

  cards.appendChild(card);  // 先にDOMへ追加（canvas幅の確定に必要）

  const rows=card.querySelectorAll('.wf-row');
  buildWave(rows[0],encPath(song.original),song.peaks_original||[],'#7d879a','元の録音',`曲 ${i+1}`);
  buildWave(rows[1],encPath(song.render),song.peaks_render||[],'#4c8dff','AIの採譜結果',`曲 ${i+1}`);

  /* 楽譜ページめくり + 五線譜/TAB切替 + コード押さえ図トグル */
  const tabPages=song.tab_pages||[];
  const tabPlainPages=song.tab_plain_pages||[];
  let mode='staff';
  const img=card.querySelector('.score-viewer img');
  const ind=card.querySelector('.page-indicator');
  const prev=card.querySelector('.page-btn.prev'),next=card.querySelector('.page-btn.next');
  const pdfLink=card.querySelector('.score-pdf-link');
  const btnStaff=card.querySelector('.mode-staff'),btnTab=card.querySelector('.mode-tab');
  const chordToggle=card.querySelector('.chord-toggle'),cdCheck=card.querySelector('.cd-check');
  let cur=0;
  function currentPages(){
    if(mode==='staff')return song.pages||[];
    return cdCheck.checked?tabPages:tabPlainPages;
  }
  function showPage(n){
    const pages=currentPages();
    cur=Math.max(0,Math.min(n,pages.length-1));
    img.src=encPath(pages[cur]);
    ind.textContent=`${cur+1} / ${pages.length}`;
    prev.disabled=cur===0;next.disabled=cur===pages.length-1;
  }
  function setMode(m){
    if(m==='tab'&&!tabPages.length&&!tabPlainPages.length)return;
    if(m==='staff'&&!(song.pages||[]).length)return;
    mode=m;
    btnStaff.classList.toggle('active',m==='staff');
    btnTab.classList.toggle('active',m==='tab');
    pdfLink.href=encPath(m==='staff'?song.pdf:song.tab_pdf);
    chordToggle.style.display=(m==='tab')?'flex':'none';
    showPage(0);
  }
  btnStaff.onclick=()=>setMode('staff');
  btnTab.onclick=()=>setMode('tab');
  cdCheck.onchange=()=>showPage(cur);
  if(!tabPages.length&&!tabPlainPages.length)btnTab.disabled=true;
  prev.onclick=()=>showPage(cur-1);
  next.onclick=()=>showPage(cur+1);
  if((song.pages||[]).length)showPage(0);else card.querySelector('.score-section').style.display='none';

  /* 判定3択（色の育ち0.2s + 極小ブリップ + burst 1回） */
  const btnWrap=card.querySelector('.judge-btns');
  const savedNote=card.querySelector('.saved-note');
  CHOICES.forEach(c=>{
    const b=document.createElement('button');b.textContent=c.label;
    if(rec.verdict===c.id)b.classList.add(c.cls);
    b.onclick=e=>{
      const isNew=rec.verdict!==c.id;
      rec.verdict=c.id;
      btnWrap.querySelectorAll('button').forEach((bb,j)=>bb.className=CHOICES[j].id===c.id?CHOICES[j].cls:'');
      save();
      savedNote.classList.add('show');setTimeout(()=>savedNote.classList.remove('show'),1600);
      if(isNew){
        blip(c.id==='same'?880:c.id==='part'?660:440,0.10,0.035);
        const r=b.getBoundingClientRect();
        burstAt(r.left+r.width/2,r.top+r.height/2,c.color);
      }
    };
    btnWrap.appendChild(b);
  });
  card.querySelector('textarea').addEventListener('input',e=>{rec.note=e.target.value;save();});
});

/* ================= 進捗・書き出し ================= */
function updateProgress(){
  const done=songs.filter(s=>store[s.id]?.verdict).length;
  document.getElementById('progress').textContent=songs.length?`判定済み ${done} / ${songs.length} 曲`:'';
  document.getElementById('export').disabled=done===0;
}
updateProgress();

document.getElementById('export').onclick=e=>{
  const out={
    exported_at:new Date().toISOString(),
    results:songs.map(s=>({id:s.id,engine:s.engine,bpm:s.bpm,n_notes:s.n_notes,
      verdict:store[s.id]?.verdict||null,note:store[s.id]?.note||''})),
  };
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='usertest-results.json';a.click();
  const toast=document.getElementById('toast');
  toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2400);
  readyChime();
  const r=e.target.getBoundingClientRect();
  burstAt(r.left+r.width/2,r.top,'#3ecf8e');
};

/* ================= 解析進行のポーリング（status.js） ================= */
function pollStatus(){
  const old=document.getElementById('status-script');if(old)old.remove();
  const s=document.createElement('script');s.id='status-script';
  s.src='status.js?t='+Date.now();
  s.onload=()=>{
    const st=window.USERTEST_STATUS;
    const banner=document.getElementById('procbanner');
    if(st&&st.stage!=='完了'&&Date.now()-st.ts<120000){
      banner.classList.add('on');
      document.getElementById('stagesong').textContent=st.song||'';
      document.getElementById('stagetext').textContent=st.stage;
      document.getElementById('stagefill').style.width=(st.pct||0)+'%';
    }else{
      if(banner.classList.contains('on')&&st&&st.stage==='完了'){readyChime();}
      banner.classList.remove('on');
    }
  };
  s.onerror=()=>{};
  document.body.appendChild(s);
}
pollStatus();
setInterval(pollStatus,2000);
</script>
